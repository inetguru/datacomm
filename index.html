<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>홍길동</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 80px 20px;
    }

    .wrap {
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .bio {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 48px;
    }

    .group {
      margin-bottom: 36px;
    }

    .group-title {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 10px;
    }

    a {
      display: block;
      padding: 13px 0;
      border-bottom: 1px solid #f0f0f0;
      text-decoration: none;
      color: #111;
      font-size: 0.92rem;
      transition: color 0.15s;
    }

    a:first-of-type {
      border-top: 1px solid #f0f0f0;
    }

    a:hover {
      color: #555;
    }

    footer {
      margin-top: 60px;
      font-size: 0.75rem;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <h1>홍길동</h1>
    <p class="bio">개발자 · 서울</p>

    <div class="group">
      <div class="group-title">소셜</div>
      <a href="https://github.com" target="_blank">GitHub</a>
      <a href="https://instagram.com" target="_blank">Instagram</a>
      <a href="https://twitter.com" target="_blank">X (Twitter)</a>
    </div>

    <div class="group">
      <div class="group-title">작업물</div>
      <a href="#" target="_blank">블로그</a>
      <a href="#" target="_blank">포트폴리오</a>
    </div>

    <div class="group">
      <div class="group-title">연락</div>
      <a href="mailto:hello@example.com">hello@example.com</a>
    </div>

    <footer>홍길동 · 2025</footer>

  </div>
</body>
</html>
