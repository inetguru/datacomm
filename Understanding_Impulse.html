<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Periodic Rectangular Pulse Fourier Coefficients</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .control-panel {
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 5px;
            background-color: #f9f9f9;
            margin-bottom: 20px;
        }
        .control-group {
            margin-bottom: 10px;
        }
        label {
            display: inline-block;
            width: 150px;
            font-weight: bold;
        }
        input[type="number"], input[type="range"] {
            width: 200px;
        }
        #p_value_display, #d_value_display {
            font-weight: bold;
            color: blue;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <h1>Periodic Rectangular Pulse Fourier Coefficients</h1>

    <div class="control-panel">
        <div class="control-group">
            <label for="p_slider">주기 (P):</label>
            <input type="range" id="p_slider" min="1" max="20" step="0.5" value="4">
            <span id="p_value_display">4</span>
        </div>
        <div class="control-group">
            <label for="d_slider">펄스 폭 (D):</label>
            <input type="range" id="d_slider" min="0.1" max="19.9" step="0.1" value="1">
            <span id="d_value_display">1</span>
        </div>
    </div>

    <div id="plot" style="width:100%;height:600px;"></div>

    <script>
        // 초기 파라미터 설정
        let P = 4;
        let D = 1;
        const num_harmonics = 30; // 표시할 하모닉 개수

        // DOM 요소 가져오기
        const p_slider = document.getElementById('p_slider');
        const d_slider = document.getElementById('d_slider');
        const p_value_display = document.getElementById('p_value_display');
        const d_value_display = document.getElementById('d_value_display');

        // 푸리에 계수 계산 함수 (Sinc 함수 형태)
        // c_n = (1/D) * (D/P) * sinc(n * f0 * D) = (1/P) * sinc(n * D / P)
        // normalized_sinc(x) = sin(pi * x) / (pi * x)
        function calculateFourierCoefficient(n, P, D) {
            if (n === 0) {
                return D / (P * D); // c0 = 1/P
            }
            const arg = n * D / P;
            return Math.sin(Math.PI * arg) / (Math.PI * n);
        }

        // 그래프 그리기 함수
        function plotFourierCoefficients() {
            // D 가 P 보다 클 수 없도록 제한 (P-0.1로)
            const max_D = P - 0.1;
            if (D > max_D) {
                D = max_D;
                d_slider.value = D;
                d_value_display.textContent = D;
            }
            // D 슬라이더의 최대값 업데이트
            d_slider.max = max_D;

            const n_values = [];
            const cn_values = [];

            // n = -num_harmonics 부터 +num_harmonics 까지 계수 계산
            for (let n = -num_harmonics; n <= num_harmonics; n++) {
                n_values.push(n);
                cn_values.push(calculateFourierCoefficient(n, P, D));
            }

            // Plotly 데이터 정의
            const data = [{
                x: n_values,
                y: cn_values,
                type: 'bar', // 바 차트로 표시
                marker: {
                    color: 'rgba(50, 171, 96, 0.6)',
                    line: {
                        color: 'rgba(50, 171, 96, 1.0)',
                        width: 1
                    }
                },
                name: `D = ${D.toFixed(1)}`
            }];

            // Plotly 레이아웃 정의
            const layout = {
                title: `Fourier Coefficients of Periodic Rectangular Pulse (P=${P.toFixed(1)}, D=${D.toFixed(1)}, Height=1/D)`,
                xaxis: {
                    title: 'Harmonic Number (n)',
                    zeroline: true,
                    showgrid: true
                },
                yaxis: {
                    title: 'Coefficient Magnitude (c_n)',
                    zeroline: true,
                    showgrid: true
                },
                margin: {
                    l: 60, r: 30, b: 60, t: 80, pad: 4
                },
                hovermode: 'closest'
            };

            // 그래프 그리기
            Plotly.newPlot('plot', data, layout);
        }

        // 슬라이더 이벤트 리스너 등록
        p_slider.addEventListener('input', function() {
            P = parseFloat(this.value);
            p_value_display.textContent = P;
            plotFourierCoefficients();
        });

        d_slider.addEventListener('input', function() {
            D = parseFloat(this.value);
            d_value_display.textContent = D;
            plotFourierCoefficients();
        });

        // 초기 그래프 그리기
        plotFourierCoefficients();

    </script>
</body>
</html>
